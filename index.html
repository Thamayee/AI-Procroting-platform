<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>VERITAS.AI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Splash Screen -->

<div id="splash">

<video id="introVideo" autoplay muted playsinline onended="showRolePage()">
<source src="veritas_ai.mp4" type="video/mp4">
</video>

</div>


<!-- Role Selection -->

<div id="rolePage" class="container hidden">

<h2>Select Your Role</h2>

<div class="role-buttons">
<button class="role-btn" onclick="showStudent()">Student</button>
<button class="role-btn" onclick="showProfessional()">Professional</button>
</div>

</div>


<!-- Student Page -->

<div id="studentPage" class="container hidden">

<button class="back" onclick="goRole()">← Back</button>

<div class="form-box">

<div class="toggle">
<button id="loginBtn" class="active" onclick="showLogin()">Login</button>
<button id="registerBtn" onclick="showRegister()">Register</button>
</div>

<div id="loginForm">

<input id="loginUser" type="text" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p class="signup-text">
If new user? <span onclick="showRegister()" class="link">Sign In</span>
</p>

</div>


<div id="registerForm" class="hidden">

<input id="studentName" type="text" placeholder="Student Name *">
<input id="collegeName" type="text" placeholder="College Name *">
<input id="mobileNumber" type="tel" placeholder="Mobile Number *">
<input id="email" type="email" placeholder="Mail ID *">
<input id="username" type="text" placeholder="Username *">
<input id="password" type="password" placeholder="Password *">
<input id="confirmPassword" type="password" placeholder="Confirm Password *">

<select id="stream">
<option value="">Select Stream</option>
<option value="BTech">BTech</option>
<option value="BE">BE</option>
<option value="BSc">BSc</option>
<option value="BCA">BCA</option>
<option value="MTech">MTech</option>
<option value="MCA">MCA</option>
</select>

<button onclick="register()">Register</button>

</div>

</div>
</div>


<!-- Professional Page -->

<div id="professionalPage" class="container hidden">

<button class="back" onclick="goRole()">← Back</button>

<div class="form-box">

<div class="toggle">

<button id="proLoginBtn" class="active" onclick="showProLogin()">Login</button>
<button id="proRegisterBtn" onclick="showProRegister()">Register</button>

</div>


<div id="proLoginForm">

<input id="proLoginUser" type="text" placeholder="Username">
<input id="proLoginPass" type="password" placeholder="Password">

<button onclick="proLogin()">Login</button>

<p class="signup-text">
If new user? <span onclick="showProRegister()" class="link">Sign In</span>
</p>

</div>


<div id="proRegisterForm" class="hidden">

<input id="proName" type="text" placeholder="Name *">
<input id="companyID" type="text" placeholder="Company ID *">
<input id="proMobile" type="tel" placeholder="Mobile Number *">
<input id="companyName" type="text" placeholder="Company Name *">
<input id="proEmail" type="email" placeholder="Mail ID *">
<input id="proUsername" type="text" placeholder="Username *">
<input id="proPassword" type="password" placeholder="Password *">
<input id="proConfirmPassword" type="password" placeholder="Confirm Password*">

<button onclick="proRegister()">Register</button>

</div>

</div>
</div>


<!-- Student Dashboard -->

<div id="dashboard" class="hidden">

<header class="dashboard-header">

<div class="logo">VERITAS.AI</div>

<div class="profile-container">

<div id="profileCircle" class="profile-circle" onclick="toggleMenu()">A</div>

<div id="profileMenu" class="profile-menu hidden">
<button class="logout-btn" onclick="logout()">🚪 Logout</button>


</div>

</div>

</header>

<div class="dashboard-content">

<h2 id="proWelcomeUser">Welcome</h2>
<p>Student Dashboard</p>

<div class="tests-section">

<button class="tests-btn" onclick="toggleTests()">Tests ▼</button>

<div id="testsMenu" class="tests-menu hidden">

<table class="tests-table">

<thead>
<tr>
<th>Test</th>
<th>Status</th>
</tr>
</thead>

<tbody>
<tr>
<td colspan="2" class="no-tests">No tests available</td>
</tr>
</tbody>

</table>

</div>

</div>

</div>

</div>


<!-- Professional Home -->

<div id="proHome" class="hidden">

<header class="pro-navbar">

<div class="pro-logo">VERITAS.AI</div>

<nav class="pro-menu">
<a href="#">Profile</a>
<a href="#">Uploads</a>
<a href="#">Results</a>
<a href="#">Records</a>
<a href="#">Contact Us</a>
</nav>

<div class="pro-profile">
<div id="proUserCircle" class="pro-circle" onclick="toggleProMenu()">U</div>

<div id="proProfileMenu" class="profile-menu hidden">
<button class="logout-btn" onclick="proLogout()">🚪 Logout</button>

</div>

</div>

</header>

<div class="pro-content">

<h2 id="proWelcomeUser">Welcome</h2>
<p>This is the Professional Home Page</p>

</div>

</div>

<script src="script.js"></script>
</body>

</html>
